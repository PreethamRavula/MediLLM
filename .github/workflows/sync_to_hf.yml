name: Sync to Hugging Face Spaces

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push clean snapshot to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Build a fresh single-commit repo from the current working tree.
          # This avoids HF Hub rejecting binary blobs that exist in old commits.
          cd /tmp
          git init hf-space
          cd hf-space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          rsync -av --exclude='.git' $GITHUB_WORKSPACE/ ./
          git add .
          git commit -m "Sync from GitHub @ ${{ github.sha }}"
          git push https://Preetham22:$HF_TOKEN@huggingface.co/spaces/Preetham22/medi-llm HEAD:main --force
